version: '2'
services:
  nginx:
    image: nginx:latest
    container_name: nginx-netboot
    ports:
      - "80:80"
    volumes:
      - ./confs/nginx.conf:/etc/nginx/nginx.conf:z
      - ./assets/boot:/usr/share/nginx/html/boot:z
  postgres:
    container_name: postgres
    image: postgres:9.6
    volumes:
      - ./scripts/create-db.sql:/docker-entrypoint-initdb.d/create-db.sql:Z
    environment:
      - POSTGRES_USER=nnag
      - POSTGRES_PASSWORD=password
    ports:
      - "54321:5432"
  ims-worker:
    container: pxe-boot
    image: localhost/ims-worker:latest
    command: "/usr/bin/ims-worker"
    env_file: ".env"
    network_mode: host
    environment:
      - IMS_API=http://10.1.0.42:8080/
    volumes:
      # Uncomment this to mount form build path
      - ./build/ims-worker:/usr/bin/ims-worker:z
      - ./assets/boot/:/var/lib/tftpboot/boot:z
      - ./pxelinux.cfg:/var/lib/tftpboot/pxelinux.cfg:z
      - /root/.kube/config:/root/.kube/config:z
    privileged:
      - true
